<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seu Presente ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fdeaea;
text-align:center;
}

.container{
padding:40px;
}

h1{
color:#8b3a3a;
}

button{
padding:15px 25px;
font-size:18px;
background:#8b3a3a;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#surpresa{
display:none;
margin-top:30px;
}

img{
max-width:400px;
border-radius:15px;
}
</style>

</head>

<body>

<div class="container">

<h1>Feliz Dia dos Namorados ❤️</h1>

<p>Eu tenho um presente especial pra você...</p>

<button onclick="mostrar()">
Clique aqui 💌
</button>

<div id="surpresa">

<h2>Surpresa!!! 🎁</h2>

<img src="foto.jpg">

<p>Te amo muito ❤️</p>

</div>

</div>

<script>

function mostrar(){
document.getElementById("surpresa").style.display="block";
}

</script>

</body>
</html>
