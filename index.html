<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Gift ❤️</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#fdeaea;
text-align:center;
}
.container{
padding:40px;
}
h1{
color:#8b3a3a;
font-size:32px;
}
p{
font-size:18px;
color:#444;
}
button{
padding:15px 25px;
font-size:18px;
background:#8b3a3a;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
button:hover{
background:#a14a4a;
}
#surprise{
display:none;
margin-top:30px;
}
img{
max-width:400px;
width:90%;
border-radius:15px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Happy Valentine’s Day ❤️</h1>

<p>I have a special gift for you...</p>

<button onclick="showSurprise()">
Click here 💌
</button>

<div id="surprise">

<h2>Surprise!!! 🎁</h2>

<img src="foto.png" alt="Our photo">

<p>
I love you so much ❤️<br>
I can’t wait to share many beautiful moments together.
</p>

</div>

</div>

<script>
function showSurprise(){
document.getElementById("surprise").style.display="block";
}
</script>

</body>
</html>
